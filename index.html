<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Lọc Mã LK Google Sheets</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background-color: #f0f8ff; width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        h2 { color: #333; margin-top: 0; flex-shrink: 0; }
        .controls { background-color: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #ddd; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; flex-shrink: 0; }
        select, button { padding: 8px 12px; font-size: 15px; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; padding: 10px 20px; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .filter-group { border-left: 2px solid #ccc; padding-left: 15px; }
        #message { font-weight: bold; margin-bottom: 5px; font-size: 15px; flex-shrink: 0; text-align: center; }
        .auto-refresh-text { font-size: 13px; color: #666; font-style: italic; margin-bottom: 10px; display: none; flex-shrink: 0; text-align: center; }
        .loading { color: #ff9900; } .error { color: red; } .success { color: green; }
        .table-wrapper { flex: 1; overflow: auto; border: 1px solid #ddd; border-radius: 4px; background-color: #fff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; white-space: nowrap; }
        th { background-color: #2196F3; color: white; position: sticky; top: 0; z-index: 2; box-shadow: 0 2px 2px -1px rgba(0,0,0,0.4); }
        tr:nth-child(even) { background-color: #f9f9f9; } tr:hover { background-color: #f1f1f1; }
        .check-column { text-align: center; width: 60px; min-width: 60px; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
        .saving { background-color: #ffe4b5 !important; }

        /* === FOOTER ĐÃ CHỈNH Ở GIỮA TRANG === */
        .footer {
            text-align: center;
            margin: 20px auto 0;
            padding-top: 15px;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
            max-width: 80%;
            align-self: center;
        }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 20px; border-radius: 12px; width: 90%; max-width: 700px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .close { color: #aaa; float: right; font-size: 32px; font-weight: bold; cursor: pointer; }
        .close:hover { color: #f00; }
        #modalStatsTable { width: 100%; border-collapse: collapse; font-size: 15px; }
        #modalStatsTable th, #modalStatsTable td { border: 1px solid #ffeaa7; padding: 10px; text-align: left; }
        #modalStatsTable th 
        #modalStatsTable tr.total { background: #f8d7da; font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>
<div class="container">
    <h2>Chỉnh sửa chẩn đoán khoa Nội</h2>

    <div class="controls">
        <div>
            <label for="sheetSelect"><strong>1. Chọn tháng: </strong></label>
            <select id="sheetSelect" disabled onchange="resetAutoRefresh()">
                <option value="">Đang tải...</option>
            </select>
            <button id="btnFilter" onclick="fetchData(false)" disabled>Tải Dữ Liệu</button>
        </div>

        <div class="filter-group">
            <label for="statusFilter"><strong>2. Lọc trạng thái: </strong></label>
            <select id="statusFilter" onchange="applyFilter()" disabled>
                <option value="all">Hiển thị Tất cả</option>
                <option value="unchecked">Chỉ hiện Chưa check ❌</option>
                <option value="checked">Chỉ hiện Đã check ✅</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="doctorFilter"><strong>3. Lọc theo Bác sĩ: </strong></label>
            <select id="doctorFilter" onchange="applyFilter()" disabled>
                <option value="all">Tất cả Bác sĩ</option>
            </select>
        </div>

        <button onclick="showStatsModal()" style="background:#2196F3;">📊 Xem Thống Kê</button>
    </div>

    <div id="message"></div>
    <div id="autoRefreshText" class="auto-refresh-text">🔄 Dữ liệu đang được tự động cập nhật mỗi 30 giây...</div>
    <div style="text-align:center;color:red;margin-top:10px">SAU KHI KẾT THÚC BỆNH ÁN NHỚ <strong>TICK VÀO Ô TRẠNG THÁI ✔️</strong></div>

    <div class="table-wrapper">
        <table id="dataTable" style="display: none;">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <!-- FOOTER ĐÃ ĐƯỢC ĐẨY VÀO GIỮA TRANG -->
    <div class="footer">
        &copy; 2026 - Công cụ được phát triển bởi <strong>Thanh Tòng</strong>.<br>Phòng KHNV
    </div>
</div>

<!-- MODAL THỐNG KÊ -->
<div id="statsModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="hideStatsModal()">&times;</span>
        <h3>📊 Thống kê bệnh án CHƯA SỬA theo Bác sĩ</h3>
        <table id="modalStatsTable">
            <thead><tr><th>Bác sĩ</th><th style="text-align:right">Chưa sửa</th></tr></thead>
            <tbody id="modalStatsBody"></tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwzbnt1rpcXDBqovIyBmwuabtBncF6-fY9loH8WdsoJ54fUyJ0D__zMucAbskj62avu/exec';

    let globalData = [];
    let currentSelectedSheet = '';
    let autoRefreshInterval = null;
    let doctorColumnName = null;

    const sheetSelect = document.getElementById('sheetSelect');
    const statusFilter = document.getElementById('statusFilter');
    const doctorFilter = document.getElementById('doctorFilter');
    const btnFilter = document.getElementById('btnFilter');
    const msgDiv = document.getElementById('message');
    const autoRefreshText = document.getElementById('autoRefreshText');

    window.onload = function () {
        msgDiv.className = 'loading';
        msgDiv.innerText = 'Đang kết nối với Google Sheets...';
        fetch(API_URL + '?action=getSheets').then(r => r.json()).then(result => {
            if (result.status === 'success') {
                sheetSelect.innerHTML = '';
                result.sheets.forEach(s => { let o = document.createElement('option'); o.value = s; o.text = s; sheetSelect.appendChild(o); });
                sheetSelect.disabled = false; btnFilter.disabled = false;
                msgDiv.innerText = 'Đã tải xong! Vui lòng bấm "Tải Dữ Liệu".'; msgDiv.className = 'success';
            }
        }).catch(() => { msgDiv.innerText = 'Lỗi kết nối API.'; msgDiv.className = 'error'; });
    };

    function resetAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = null; autoRefreshText.style.display = 'none';
        doctorFilter.innerHTML = '<option value="all">Tất cả Bác sĩ</option>'; doctorFilter.disabled = true;
        statusFilter.disabled = true;
    }

    function detectDoctorColumn(data) {
        if (!data || data.length === 0) return null;
        const headers = Object.keys(data[0]);
        if (headers.includes('Tên Bác Sỹ (Lỗi)')) return 'Tên Bác Sỹ (Lỗi)';
        const keywords = ['bác sĩ','bác sỹ','bs','doctor','tên bs','phụ trách','điều trị','chủ trị'];
        for (let h of headers) {
            const lower = h.toLowerCase().trim();
            if (keywords.some(k => lower.includes(k))) return h;
        }
        return null;
    }

    function populateDoctorFilter() {
        doctorColumnName = detectDoctorColumn(globalData);
        const doctors = new Set();
        if (!doctorColumnName) return;
        globalData.forEach(row => {
            const isChecked = (row['Check'] === 'TRUE' || row['Check'] === true || row['Check'] === 'true');
            if (!isChecked) {
                let docStr = String(row[doctorColumnName] || '').trim();
                if (docStr) {
                    const splitDocs = docStr.split(/[,;\/]/).map(d => d.trim()).filter(Boolean);
                    splitDocs.forEach(d => doctors.add(d));
                }
            }
        });
        doctorFilter.innerHTML = '<option value="all">Tất cả Bác sĩ</option>';
        Array.from(doctors).sort().forEach(d => {
            let o = document.createElement('option'); o.value = d; o.textContent = d; doctorFilter.appendChild(o);
        });
        doctorFilter.disabled = false;
    }

    function updateModalStatistics() {
        const tbody = document.getElementById('modalStatsBody');
        if (!globalData.length || !doctorColumnName) return;
        const unchecked = {};
        let total = 0;
        globalData.forEach(row => {
            const isChecked = (row['Check'] === 'TRUE' || row['Check'] === true || row['Check'] === 'true');
            if (!isChecked) {
                let docStr = String(row[doctorColumnName] || '').trim();
                if (docStr) {
                    const doctors = docStr.split(/[,;\/]/).map(d => d.trim()).filter(Boolean);
                    doctors.forEach(doc => {
                        unchecked[doc] = (unchecked[doc] || 0) + 1;
                        total++;
                    });
                }
            }
        });
        const sortedDoctors = Object.entries(unchecked).filter(([_, c]) => c > 0).sort((a,b) => b[1] - a[1]);
        if (sortedDoctors.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" style="text-align:center;color:green;font-weight:bold;padding:30px;">✅ Tất cả bệnh án đã được sửa xong!</td></tr>`;
            return;
        }
        let rows = '';
        sortedDoctors.forEach(([name, count]) => rows += `<tr><td>${name}</td><td style="text-align:right;font-weight:bold">${count}</td></tr>`);
        rows += `<tr class="total"><td>TỔNG CỘNG</td><td style="text-align:right">${total}</td></tr>`;
        tbody.innerHTML = rows;
    }

    function showStatsModal() {
        updateModalStatistics();
        document.getElementById('statsModal').style.display = 'block';
    }

    function hideStatsModal() {
        document.getElementById('statsModal').style.display = 'none';
    }

    function fetchData(isAuto = false) {
        currentSelectedSheet = sheetSelect.value;
        if (!currentSelectedSheet) return;
        if (!isAuto) {
            msgDiv.className = 'loading';
            msgDiv.innerText = `Đang lấy dữ liệu từ "${currentSelectedSheet}"...`;
        }
        fetch(`${API_URL}?sheetName=${encodeURIComponent(currentSelectedSheet)}`)
            .then(r => r.json())
            .then(result => {
                if (result.status === 'success') {
                    globalData = result.data || [];
                    if (globalData.length > 0) {
                        statusFilter.disabled = false;
                        populateDoctorFilter();
                        if (!isAuto) { statusFilter.value = 'all'; doctorFilter.value = 'all'; }
                        applyFilter();
                        if (!isAuto && !autoRefreshInterval) {
                            autoRefreshText.style.display = 'block';
                            autoRefreshInterval = setInterval(() => fetchData(true), 30000);
                        }
                    } else {
                        msgDiv.innerText = 'Trang không có dữ liệu.'; msgDiv.className = 'error';
                    }
                }
            })
            .catch(() => { msgDiv.innerText = 'Lỗi kết nối!'; msgDiv.className = 'error'; });
    }

    function applyFilter() {
        const statusType = statusFilter.value;
        const selectedDoctor = doctorFilter.value;

        const filteredData = globalData.filter(row => {
            const isChecked = (row['Check'] === 'TRUE' || row['Check'] === true || row['Check'] === 'true');
            if (statusType === 'checked' && !isChecked) return false;
            if (statusType === 'unchecked' && isChecked) return false;
            if (selectedDoctor !== 'all' && doctorColumnName) {
                let docStr = String(row[doctorColumnName] || '').trim();
                const doctorsInRow = docStr.split(/[,;\/]/).map(d => d.trim()).filter(Boolean);
                if (!doctorsInRow.includes(selectedDoctor)) return false;
            }
            return true;
        });

        const now = new Date();
        const timeString = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
        msgDiv.innerHTML = `Đang hiển thị ${filteredData.length} / ${globalData.length} kết quả (Cập nhật lúc: ${timeString}).`;
        msgDiv.className = 'success';

        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');

        if (filteredData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="100%" style="text-align:center;padding:30px;">Không có dữ liệu khớp bộ lọc.</td></tr>';
            document.getElementById('dataTable').style.display = 'table';
            return;
        }

        let headers = Object.keys(globalData[0]).filter(h => h !== '_rowIndex');
        if (!headers.includes('Check')) headers.unshift('Check');

        let headerRow = '<tr>';
        headers.forEach(h => headerRow += h === 'Check' ? `<th class="check-column">Trạng thái</th>` : `<th>${h}</th>`);
        headerRow += '</tr>';
        thead.innerHTML = headerRow;

        let bodyRows = '';
        filteredData.forEach(row => {
            const rowIndex = row['_rowIndex'];
            bodyRows += `<tr id="row-${rowIndex}">`;
            headers.forEach(h => {
                if (h === 'Check') {
                    const checked = (row[h] === 'TRUE' || row[h] === true) ? 'checked' : '';
                    bodyRows += `<td class="check-column"><input type="checkbox" ${checked} onchange="updateCheckStatus('${currentSelectedSheet}', ${rowIndex}, this)"></td>`;
                } else {
                    bodyRows += `<td>${row[h] !== undefined ? row[h] : ''}</td>`;
                }
            });
            bodyRows += '</tr>';
        });
        tbody.innerHTML = bodyRows;
        document.getElementById('dataTable').style.display = 'table';
    }

    function updateCheckStatus(sheetName, rowIndex, checkboxElement) {
        checkboxElement.disabled = true;
        let trElement = document.getElementById(`row-${rowIndex}`);
        trElement.classList.add('saving');
        let isChecked = checkboxElement.checked;
        let dateStr = '';
        if (isChecked) {
            let now = new Date();
            dateStr = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
        }
        fetch(`${API_URL}?action=updateCheck&sheetName=${encodeURIComponent(sheetName)}&rowIndex=${rowIndex}&isChecked=${isChecked}`)
            .then(r => r.json())
            .then(result => {
                checkboxElement.disabled = false; trElement.classList.remove('saving');
                if (result.status === 'success') {
                    let rowToUpdate = globalData.find(r => r['_rowIndex'] === rowIndex);
                    if (rowToUpdate) { rowToUpdate['Check'] = isChecked ? 'TRUE' : 'FALSE'; rowToUpdate['Ngày sửa'] = dateStr; }
                    populateDoctorFilter();
                    applyFilter();
                } else {
                    alert('Lỗi lưu: ' + result.message); checkboxElement.checked = !isChecked;
                }
            })
            .catch(() => {
                checkboxElement.disabled = false; trElement.classList.remove('saving');
                alert('Mất kết nối!'); checkboxElement.checked = !isChecked;
            });
    }

    window.onclick = function(event) {
        const modal = document.getElementById('statsModal');
        if (event.target === modal) hideStatsModal();
    };
</script>
</body>
</html>
