  <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa thiếu chỉ định CLS khoa Nội</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f0f8ff; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .controls { background-color: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ddd; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content:center}
        select, button { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; padding: 10px 20px; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2196F3; color: white; position: sticky; top: 0; z-index: 1; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        
        .check-column { text-align: center; width: 80px; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
        .saving { background-color: #ffe4b5 !important; } 
        
        #message { font-weight: bold; margin-bottom: 15px; font-size: 16px;text-align:center }
        .loading { color: #ff9900; }
        .error { color: red; }
        .success { color: green; }
        .filter-group { border-left: 2px solid #ccc; padding-left: 15px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container" >
    <h2 style="text-align:center">Chỉnh sửa thiếu chỉ định CLS khoa Nội</h2>
    
    <div class="controls" >
        <div>
            <label for="sheetSelect"><strong>1. Trang tính: </strong></label>
            <select id="sheetSelect" disabled>
                <option value="">Đang tải...</option>
            </select>
            <button id="btnFilter" onclick="fetchData()" disabled>Tải Dữ Liệu</button>
        </div>
        
        <div class="filter-group">
            <label for="statusFilter"><strong>2. Lọc trạng thái: </strong></label>
            <select id="statusFilter" onchange="applyFilter()" disabled>
                <option value="all">Hiển thị Tất cả</option>
                <option value="unchecked">Chỉ hiện Chưa check ❌</option>
                <option value="checked">Chỉ hiện Đã check ✅</option>
            </select>
        </div>
    </div>

    <div id="message"></div>
    
    <div style="overflow-x:auto; max-height: 600px; border-bottom: 1px solid #ddd;">
        <table id="dataTable" style="display: none;">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // === ĐIỀN LINK API CỦA BẠN VÀO BÊN DƯỚI ===
    const API_URL = 'https://script.google.com/macros/s/AKfycbzEFWAeJhqQ-OX7Lp2mos3Bo0paEU5GaLIjRo_h4fiVuOYesfCiVPFYV6Xcoy7AZnaG/exec';
    
    const sheetSelect = document.getElementById('sheetSelect');
    const statusFilter = document.getElementById('statusFilter');
    const btnFilter = document.getElementById('btnFilter');
    const msgDiv = document.getElementById('message');
    const table = document.getElementById('dataTable');

    // Biến toàn cục để lưu trữ dữ liệu đã tải về
    let globalData = [];
    let currentSelectedSheet = '';

    window.onload = function() {
        msgDiv.className = 'loading';
        msgDiv.innerText = 'Đang kết nối với Google Sheets...';
        
        fetch(API_URL + '?action=getSheets')
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    sheetSelect.innerHTML = ''; 
                    result.sheets.forEach(sheetName => {
                        let option = document.createElement('option');
                        option.value = sheetName;
                        option.text = sheetName;
                        sheetSelect.appendChild(option);
                    });
                    sheetSelect.disabled = false;
                    btnFilter.disabled = false;
                    msgDiv.innerText = 'Đã tải xong! Vui lòng bấm "Tải Dữ Liệu".';
                    msgDiv.className = 'success';
                } else {
                    msgDiv.innerText = 'Lỗi: ' + result.message;
                    msgDiv.className = 'error';
                }
            })
            .catch(error => {
                msgDiv.innerText = 'Lỗi kết nối. Vui lòng kiểm tra lại Link API.';
                msgDiv.className = 'error';
            });
    }

    function fetchData() {
        currentSelectedSheet = sheetSelect.value;
        if (!currentSelectedSheet) return;

        msgDiv.className = 'loading';
        msgDiv.innerText = `Đang lấy dữ liệu từ trang "${currentSelectedSheet}"...`;
        table.style.display = 'none'; 
        btnFilter.disabled = true; 
        statusFilter.disabled = true;

        fetch(`${API_URL}?sheetName=${encodeURIComponent(currentSelectedSheet)}`)
            .then(response => response.json())
            .then(result => {
                btnFilter.disabled = false; 
                if (result.status === 'success') {
                    if (result.data.length > 0) {
                        // Lưu dữ liệu vào biến toàn cục để bộ lọc xử lý
                        globalData = result.data;
                        statusFilter.disabled = false; // Mở khóa bộ lọc trạng thái
                        statusFilter.value = 'all'; // Trả bộ lọc về mặc định
                        
                        applyFilter(); // Gọi hàm vẽ bảng
                        
                    } else {
                        globalData = [];
                        msgDiv.innerText = `Không có dữ liệu thỏa mãn ở trang "${currentSelectedSheet}".`;
                        msgDiv.className = 'error';
                    }
                } else {
                    msgDiv.innerText = 'Lỗi: ' + result.message;
                    msgDiv.className = 'error';
                }
            })
            .catch(error => {
                btnFilter.disabled = false;
                msgDiv.innerText = 'Lỗi khi tải dữ liệu!';
                msgDiv.className = 'error';
            });
    }

    // Hàm áp dụng bộ lọc và vẽ lại bảng
    function applyFilter() {
        const filterType = statusFilter.value;
        
        // Lọc dữ liệu dựa trên dropdown
        const filteredData = globalData.filter(row => {
            let isChecked = (row['Check'] === 'TRUE' || row['Check'] === true || row['Check'] === 'true');
            if (filterType === 'checked') return isChecked;
            if (filterType === 'unchecked') return !isChecked;
            return true; // Nếu chọn 'all'
        });

        // Hiển thị thông báo
        msgDiv.innerText = `Đang hiển thị ${filteredData.length} / ${globalData.length} kết quả (Trang: ${currentSelectedSheet}).`;
        msgDiv.className = 'success';

        if (filteredData.length === 0) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="100%" style="text-align:center;">Không có dữ liệu nào khớp với bộ lọc này.</td></tr>';
            table.style.display = 'table';
            return;
        }

        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        
        let headers = Object.keys(globalData[0]).filter(h => h !== '_rowIndex');
        if (!headers.includes('Check')) headers.unshift('Check'); 

        // Vẽ Header
        let headerRow = '<tr>';
        headers.forEach(h => {
            if(h === 'Check') headerRow += `<th class="check-column">Trạng thái</th>`;
            else headerRow += `<th>${h}</th>`;
        });
        headerRow += '</tr>';
        thead.innerHTML = headerRow;

        // Vẽ Body với dữ liệu ĐÃ ĐƯỢC LỌC
        let bodyRows = '';
        filteredData.forEach(row => {
            let rowIndex = row['_rowIndex'];
            bodyRows += `<tr id="row-${rowIndex}">`;
            
            headers.forEach(h => {
                if(h === 'Check') {
                    let isChecked = (row[h] === 'TRUE' || row[h] === true || row[h] === 'true') ? 'checked' : '';
                    bodyRows += `
                        <td class="check-column">
                            <input type="checkbox" ${isChecked} 
                            onchange="updateCheckStatus('${currentSelectedSheet}', ${rowIndex}, this)">
                        </td>`;
                } else {
                    bodyRows += `<td>${row[h] !== undefined ? row[h] : ''}</td>`;
                }
            });
            bodyRows += '</tr>';
        });
        tbody.innerHTML = bodyRows;
        table.style.display = 'table';
    }

    function updateCheckStatus(sheetName, rowIndex, checkboxElement) {
        checkboxElement.disabled = true;
        let trElement = document.getElementById(`row-${rowIndex}`);
        trElement.classList.add('saving'); 

        let isChecked = checkboxElement.checked;
        
        let url = `${API_URL}?action=updateCheck&sheetName=${encodeURIComponent(sheetName)}&rowIndex=${rowIndex}&isChecked=${isChecked}`;

        fetch(url)
            .then(response => response.json())
            .then(result => {
                checkboxElement.disabled = false;
                trElement.classList.remove('saving');
                
                if (result.status === 'success') {
                    // Cập nhật lại biến globalData để nếu đổi bộ lọc, nó vẫn nhớ trạng thái
                    let rowToUpdate = globalData.find(r => r['_rowIndex'] === rowIndex);
                    if (rowToUpdate) {
                        rowToUpdate['Check'] = isChecked ? 'TRUE' : 'FALSE';
                    }
                    
                    // Nếu đang ở chế độ lọc "Chưa check" mà tích vào, dòng đó sẽ tự động ẩn đi cho gọn mắt
                    if (statusFilter.value !== 'all') {
                        setTimeout(() => applyFilter(), 500); // Đợi nửa giây rồi ẩn dòng đi
                    }
                } else {
                    alert('Lỗi lưu trạng thái: ' + result.message);
                    checkboxElement.checked = !isChecked; 
                }
            })
            .catch(error => {
                checkboxElement.disabled = false;
                trElement.classList.remove('saving');
                alert('Mất kết nối! Không thể lưu trạng thái.');
                checkboxElement.checked = !isChecked; 
            });
    }
</script>
</body>
</html>
