<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Lọc Mã LK Google Sheets</title>
    <style>
        /* Đảm bảo padding không làm tăng kích thước phần tử */
        * { box-sizing: border-box; }

        /* Ép toàn bộ trang web chiếm chính xác 100% màn hình, không cuộn ngoài */
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 15px; 
            background-color: #f0f8ff; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Cấm cuộn trang tổng */
        }

        /* Container chính tự động co giãn lấp đầy phần không gian còn lại */
        .container { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            overflow: hidden; /* Giữ mọi thứ nằm gọn trong khung trắng */
        }

        h2 { color: #333; margin-top: 0; flex-shrink: 0; }

        /* Thanh điều khiển co giãn responsive cho laptop nhỏ */
        .controls { 
            background-color: #e9ecef; 
            padding: 15px; 
            border-radius: 5px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
justify-content:center;
            align-items: center; 
            flex-shrink: 0; /* Không bị bóp méo khi bảng quá dài */
        }
        select, button { padding: 8px 12px; font-size: 15px; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; padding: 10px 20px; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .filter-group { border-left: 2px solid #ccc; padding-left: 15px; }

        #message { font-weight: bold; margin-bottom: 5px; font-size: 15px; flex-shrink: 0; text-align:center}
        .auto-refresh-text { font-size: 13px; color: #666; font-style: italic; margin-bottom: 10px; display: none; flex-shrink: 0; text-align:center}
        .loading { color: #ff9900; }
        .error { color: red; }
        .success { color: green; }

        /* --- VÙNG CUỘN RIÊNG CHO BẢNG --- */
        .table-wrapper {
            flex: 1; /* Chiếm toàn bộ chiều cao còn lại của khung trắng */
            overflow: auto; /* Chỉ hiện thanh cuộn ở khu vực này */
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
        }

        table { width: 100%; border-collapse: collapse; margin: 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; white-space: nowrap; /* Chống rớt dòng làm xấu bảng */ }
        th { 
            background-color: #2196F3; 
            color: white; 
            position: sticky; 
            top: 0; 
            z-index: 2; 
            box-shadow: 0 2px 2px -1px rgba(0,0,0,0.4); /* Tạo bóng đổ nhẹ cho tiêu đề khi cuộn */
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        
        .check-column { text-align: center; width: 60px; min-width: 60px; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
        .saving { background-color: #ffe4b5 !important; } 

        .footer {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #ddd;
            flex-shrink: 0; /* Ép Footer luôn nằm dưới cùng */
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">Chỉnh sửa chấn đoán khoa Nội </h2>
    
    <div class="controls">
        <div>
            <label for="sheetSelect"><strong>1. Chọn tháng: </strong></label>
            <select id="sheetSelect" disabled onchange="resetAutoRefresh()">
                <option value="">Đang tải...</option>
            </select>
            <button id="btnFilter" onclick="fetchData(false)" disabled>Tải Dữ Liệu</button>
        </div>
        
        <div class="filter-group">
            <label for="statusFilter"><strong>2. Lọc trạng thái: </strong></label>
            <select id="statusFilter" onchange="applyFilter()" disabled>
                <option value="all">Hiển thị Tất cả</option>
                <option value="unchecked">Chỉ hiện Chưa check ❌</option>
                <option value="checked">Chỉ hiện Đã check ✅</option>
            </select>
        </div>
    </div>

    <div id="message"></div>
    <div id="autoRefreshText" class="auto-refresh-text">🔄 Dữ liệu đang được tự động cập nhật mỗi 30 giây...</div>
    <div style="text-align:center;color:red;margin-top:10px"> SAU KHI KẾT THÚC BỆNH ÁN NHỚ <strong>TICK VÀO Ô TRẠNG THÁI ✔️</strong> ĐỂ BIẾT BỆNH ÁN ĐÓ ĐÃ SỬA </div> 
    <div class="table-wrapper">
        <table id="dataTable" style="display: none;">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer">
        &copy; 2026 - Công cụ được phát triển bởi <strong>Thanh Tòng</strong>.<br>
        Phòng KHNV
    </div>
</div>

<script>
    // === ĐIỀN LINK API CỦA BẠN VÀO BÊN DƯỚI ===
    const API_URL = 'https://script.google.com/macros/s/AKfycbzEFWAeJhqQ-OX7Lp2mos3Bo0paEU5GaLIjRo_h4fiVuOYesfCiVPFYV6Xcoy7AZnaG/exec';
    
    const sheetSelect = document.getElementById('sheetSelect');
    const statusFilter = document.getElementById('statusFilter');
    const btnFilter = document.getElementById('btnFilter');
    const msgDiv = document.getElementById('message');
    const autoRefreshText = document.getElementById('autoRefreshText');
    const table = document.getElementById('dataTable');

    let globalData = [];
    let currentSelectedSheet = '';
    let autoRefreshInterval = null; 

    window.onload = function() {
        msgDiv.className = 'loading';
        msgDiv.innerText = 'Đang kết nối với Google Sheets...';
        
        fetch(API_URL + '?action=getSheets')
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    sheetSelect.innerHTML = ''; 
                    result.sheets.forEach(sheetName => {
                        let option = document.createElement('option');
                        option.value = sheetName;
                        option.text = sheetName;
                        sheetSelect.appendChild(option);
                    });
                    sheetSelect.disabled = false;
                    btnFilter.disabled = false;
                    msgDiv.innerText = 'Đã tải xong! Vui lòng bấm "Tải Dữ Liệu".';
                    msgDiv.className = 'success';
                } else {
                    msgDiv.innerText = 'Lỗi: ' + result.message;
                    msgDiv.className = 'error';
                }
            })
            .catch(error => {
                msgDiv.innerText = 'Lỗi kết nối. Vui lòng kiểm tra lại Link API.';
                msgDiv.className = 'error';
            });
    }

    function resetAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
        autoRefreshText.style.display = 'none';
        table.style.display = 'none';
        msgDiv.innerText = 'Vui lòng bấm "Tải Dữ Liệu" cho trang tính mới.';
        msgDiv.className = 'loading';
    }

    function fetchData(isAuto = false) {
        currentSelectedSheet = sheetSelect.value;
        if (!currentSelectedSheet) return;

        if (!isAuto) {
            msgDiv.className = 'loading';
            msgDiv.innerText = `Đang lấy dữ liệu từ trang "${currentSelectedSheet}"...`;
            table.style.display = 'none'; 
            btnFilter.disabled = true; 
            statusFilter.disabled = true;
        }

        fetch(`${API_URL}?sheetName=${encodeURIComponent(currentSelectedSheet)}`)
            .then(response => response.json())
            .then(result => {
                btnFilter.disabled = false; 
                if (result.status === 'success') {
                    if (result.data.length > 0) {
                        globalData = result.data;
                        statusFilter.disabled = false; 
                        
                        if (!isAuto) statusFilter.value = 'all'; 
                        
                        applyFilter(); 

                        if (!isAuto && !autoRefreshInterval) {
                            autoRefreshText.style.display = 'block';
                            autoRefreshInterval = setInterval(() => {
                                fetchData(true); 
                            }, 30000); 
                        }
                    } else {
                        globalData = [];
                        msgDiv.innerText = `Không có dữ liệu thỏa mãn ở trang "${currentSelectedSheet}".`;
                        msgDiv.className = 'error';
                        resetAutoRefresh();
                    }
                } else {
                    msgDiv.innerText = 'Lỗi: ' + result.message;
                    msgDiv.className = 'error';
                    resetAutoRefresh();
                }
            })
            .catch(error => {
                btnFilter.disabled = false;
                if (!isAuto) {
                    msgDiv.innerText = 'Lỗi khi tải dữ liệu!';
                    msgDiv.className = 'error';
                }
            });
    }

    function applyFilter() {
        const filterType = statusFilter.value;
        
        const filteredData = globalData.filter(row => {
            let isChecked = (row['Check'] === 'TRUE' || row['Check'] === true || row['Check'] === 'true');
            if (filterType === 'checked') return isChecked;
            if (filterType === 'unchecked') return !isChecked;
            return true; 
        });

        const now = new Date();
        const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');

        msgDiv.innerHTML = `Đang hiển thị ${filteredData.length} / ${globalData.length} kết quả (Cập nhật lúc: ${timeString}).`;
        msgDiv.className = 'success';

        if (filteredData.length === 0) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="100%" style="text-align:center; padding: 20px;">Không có dữ liệu nào khớp với bộ lọc này.</td></tr>';
            table.style.display = 'table';
            return;
        }

        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        
        let headers = Object.keys(globalData[0]).filter(h => h !== '_rowIndex');
        if (!headers.includes('Check')) headers.unshift('Check'); 

        let headerRow = '<tr>';
        headers.forEach(h => {
            if(h === 'Check') headerRow += `<th class="check-column">Trạng thái</th>`;
            else headerRow += `<th>${h}</th>`;
        });
        headerRow += '</tr>';
        thead.innerHTML = headerRow;

        let bodyRows = '';
        filteredData.forEach(row => {
            let rowIndex = row['_rowIndex'];
            bodyRows += `<tr id="row-${rowIndex}">`;
            
            headers.forEach(h => {
                if(h === 'Check') {
                    let isChecked = (row[h] === 'TRUE' || row[h] === true || row[h] === 'true') ? 'checked' : '';
                    bodyRows += `
                        <td class="check-column">
                            <input type="checkbox" ${isChecked} 
                            onchange="updateCheckStatus('${currentSelectedSheet}', ${rowIndex}, this)">
                        </td>`;
                } else {
                    bodyRows += `<td>${row[h] !== undefined ? row[h] : ''}</td>`;
                }
            });
            bodyRows += '</tr>';
        });
        tbody.innerHTML = bodyRows;
        table.style.display = 'table';
    }

    function updateCheckStatus(sheetName, rowIndex, checkboxElement) {
        checkboxElement.disabled = true;
        let trElement = document.getElementById(`row-${rowIndex}`);
        trElement.classList.add('saving'); 

        let isChecked = checkboxElement.checked;
        
        let url = `${API_URL}?action=updateCheck&sheetName=${encodeURIComponent(sheetName)}&rowIndex=${rowIndex}&isChecked=${isChecked}`;

        fetch(url)
            .then(response => response.json())
            .then(result => {
                checkboxElement.disabled = false;
                trElement.classList.remove('saving');
                
                if (result.status === 'success') {
                    let rowToUpdate = globalData.find(r => r['_rowIndex'] === rowIndex);
                    if (rowToUpdate) {
                        rowToUpdate['Check'] = isChecked ? 'TRUE' : 'FALSE';
                    }
                    
                    if (statusFilter.value !== 'all') {
                        setTimeout(() => applyFilter(), 500); 
                    }
                } else {
                    alert('Lỗi lưu trạng thái: ' + result.message);
                    checkboxElement.checked = !isChecked; 
                }
            })
            .catch(error => {
                checkboxElement.disabled = false;
                trElement.classList.remove('saving');
                alert('Mất kết nối! Không thể lưu trạng thái.');
                checkboxElement.checked = !isChecked; 
            });
    }
</script>
</body>
</html>
